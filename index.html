<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GN RP</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="loginScreen" class="login-screen">
    <div class="login-box">
        <h1>Gendarmerie Nationale RP</h1>

        <input type="text" id="loginUsername" placeholder="Identifiant">
        <input type="password" id="loginPassword" placeholder="Mot de passe">

        <button onclick="login()">Connexion</button>

        <p id="loginError"></p>
    </div>
</div>

<div id="app" class="hidden">

    <header>
        <h1>Fichier GN RP</h1>

        <div>
            <span id="currentUser"></span>
            <button onclick="logout()">Déconnexion</button>
        </div>
    </header>

    <nav>
        <button onclick="showPage('dashboard')">Accueil</button>
        <button onclick="showPage('citizens')">Contrevenants</button>
        <button onclick="showPage('users')">Utilisateurs</button>
    </nav>

    <section id="dashboard" class="page">
        <h2>Tableau de bord</h2>

        <div class="cards">
            <div class="card">
                <h3 id="countCitizens">0</h3>
                <p>Contrevenants</p>
            </div>

            <div class="card">
                <h3 id="countUsers">0</h3>
                <p>Utilisateurs</p>
            </div>
        </div>
    </section>

    <section id="citizens" class="page hidden">

        <h2>Nouveau contrevenant</h2>

        <input id="citizenNom" placeholder="Nom">
        <input id="citizenPrenom" placeholder="Prénom">
        <input id="citizenIdentite" placeholder="Numéro identité">

        <button onclick="createCitizen()">
            Créer fiche
        </button>

        <hr>

        <div id="citizensList"></div>

    </section>

    <section id="users" class="page hidden">

        <h2>Gestion Utilisateurs</h2>

        <input id="newUserName" placeholder="Identifiant">
        <input id="newUserPass" placeholder="Mot de passe">
        <input id="newUserRole" placeholder="Grade">

        <button onclick="createUser()">
            Ajouter utilisateur
        </button>

        <hr>

        <div id="usersList"></div>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
